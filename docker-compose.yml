services:
  app:
    build: .
    ports:
    - 8501:8501
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
      - AP_MANAGEMENT_URL=http://ap-management:5000
      - AP_EXECUTOR_URL=http://ap-executor:5000
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy


  neo4j:
    image: neo4j:5.26
    container_name: demo-fares-neo4j
    environment:
      - NEO4J_AUTH=neo4j/momademo
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s

  postgres:
    image: postgres:17
    container_name: demo-fares-postgres
    volumes:
      - ./postgres-seed:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_DB=mathe
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U provdemo -d mathe" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ap-management:
    image: ghcr.io/datagems-eosc/datagems-eosc/ap-management:v0.4.6
    container_name: demo-fares-ap-management
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
    restart: always
    depends_on:
      neo4j:
        condition: service_healthy

  ap-executor:
    image: ghcr.io/sotrx/sotrx/ap-executor:v0.1.2
    container_name: demo-fares-ap-executor
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_HOST=demo-fares-postgres
      - POSTGRES_PORT=5432
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
