services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3.14-trixie
    container_name: demo-fares-devcontainer
    volumes:
      - .:/workspaces:cached
    command: sleep infinity
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
      - AP_MANAGEMENT_URL=http://ap-management:5000
      - AP_EXECUTOR_URL=http://ap-executor:5000
    depends_on:
      neo4j:
        condition: service_healthy
